<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentFlow Pro - Shailesh Edition</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/reactflow@11/dist/umd/index.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reactflow@11/dist/style.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; overflow: hidden; }
        .app-container { display: flex; height: 100vh; }
        .sidebar { width: 260px; background: #1e293b; border-right: 1px solid #334155; display: flex; flex-direction: column; }
        .nav-item { padding: 12px 20px; cursor: pointer; color: #94a3b8; display: flex; align-items: center; gap: 12px; }
        .nav-item.active { background: #2563eb; color: white; }
        .main-content { flex: 1; display: flex; flex-direction: column; }
        .top-bar { height: 60px; background: #1e293b; border-bottom: 1px solid #334155; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        .chat-view { flex: 1; display: flex; flex-direction: column; max-width: 800px; margin: 0 auto; width: 100%; padding: 20px; overflow-y: auto; }
        .message { padding: 12px 16px; border-radius: 12px; margin-bottom: 10px; max-width: 80%; }
        .message.user { background: #334155; align-self: flex-end; }
        .message.assistant { background: #2563eb; align-self: flex-start; }
        .canvas-container { flex: 1; position: relative; }
        .btn { padding: 8px 16px; border-radius: 6px; cursor: pointer; border: none; font-weight: 500; }
        .btn-primary { background: #2563eb; color: white; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useCallback } = React;
        const { ReactFlow, ReactFlowProvider, addEdge, Background, Controls, MiniMap, useNodesState, useEdgesState } = ReactFlowInstance;
        const App = () => {
            const [view, setView] = useState('chat');
            const [messages, setMessages] = useState([{role:'assistant', content:'Hello Shailesh! How can I help?'}]);
            const [input, setInput] = useState('');
            const [nodes, setNodes, onNodesChange] = useNodesState([]);
            const [edges, setEdges, onEdgesChange] = useEdgesState([]);
            const sendMessage = async () => {
                if(!input.trim()) return;
                const newMsgs = [...messages, {role:'user', content:input}];
                setMessages(newMsgs);
                setInput('');
                const res = await fetch('http://localhost:8000/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({message: input, session_id: 'default'})
                });
                const data = await res.json();
                setMessages([...newMsgs, {role:'assistant', content: data.reply}]);
            };
            return (
                <div className="app-container">
                    <div className="sidebar">
                        <div style={{padding:'20px', fontWeight:'bold', fontSize:'20px'}}>AgentFlow</div>
                        <div className={`nav-item ${view==='chat'?'active':''}`} onClick={()=>setView('chat')}>Chat</div>
                        <div className={`nav-item ${view==='workflow'?'active':''}`} onClick={()=>setView('workflow')}>Workflows</div>
                    </div>
                    <div className="main-content">
                        <div className="top-bar">
                            <span>Session: <b>default</b></span>
                            <button className="btn btn-primary" onClick={()=>setMessages([])}>Clear Memory</button>
                        </div>
                        {view === 'chat' ? (
                            <div className="chat-view">
                                <div style={{flex:1, overflowY:'auto'}}>
                                    {messages.map((m,i)=><div key={i} className={`message ${m.role}`}>{m.content}</div>)}
                                </div>
                                <div style={{display:'flex', gap:'10px', marginTop:'20px'}}>
                                    <input style={{flex:1, padding:'10px', borderRadius:'8px', border:'1px solid #334155', background:'#1e293b', color:'white'}} value={input} onChange={e=>setInput(e.target.value)} onKeyPress={e=>e.key==='Enter'&&sendMessage()} />
                                    <button className="btn btn-primary" onClick={sendMessage}>Send</button>
                                </div>
                            </div>
                        ) : (
                            <div className="canvas-container">
                                <ReactFlow nodes={nodes} edges={edges} onNodesChange={onNodesChange} onConnect={p=>setEdges(e=>addEdge(p,e))} fitView>
                                    <Background color="#334155" />
                                    <Controls />
                                    <MiniMap />
                                </ReactFlow>
                            </div>
                        )}
                    </div>
                </div>

        };
        ReactDOM.createRoot(document.getElementById('root')).render(<ReactFlowProvider><App /></ReactFlowProvider>);
    </script>
</body>
</html>
