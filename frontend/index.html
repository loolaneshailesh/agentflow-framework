<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentFlow Pro - Grok Orchestration</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/reactflow@11/dist/umd/index.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reactflow@11/dist/style.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: #0f172a; color: #f8fafc; }
        .app-container { display: flex; height: 100vh; width: 100vw; overflow: hidden; }
        .sidebar { width: 280px; background: #1e293b; border-right: 1px solid #334155; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid #334155; display: flex; align-items: center; gap: 10px; }
        .sidebar-content { flex: 1; overflow-y: auto; padding: 15px; }
        .nav-item { padding: 12px 15px; margin-bottom: 5px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: all 0.2s; color: #94a3b8; }
        .nav-item:hover { background: #334155; color: #f8fafc; }
        .nav-item.active { background: #2563eb; color: white; }
        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; }
        .top-bar { height: 60px; background: #1e293b; border-bottom: 1px solid #334155; display: flex; align-items: center; justify-content: space-between; padding: 0 25px; }
        .content-body { flex: 1; position: relative; overflow: hidden; }
        .chat-view { display: flex; flex-direction: column; height: 100%; max-width: 900px; margin: 0 auto; width: 100%; }
        .messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .message { padding: 16px; border-radius: 12px; max-width: 85%; line-height: 1.5; }
        .message.user { background: #334155; align-self: flex-end; border-bottom-right-radius: 2px; }
        .message.assistant { background: #2563eb; align-self: flex-start; border-bottom-left-radius: 2px; }
        .chat-input-area { padding: 25px; border-top: 1px solid #334155; }
        .input-wrapper { background: #334155; border-radius: 12px; padding: 5px 15px; display: flex; align-items: center; border: 1px solid transparent; transition: 0.2s; }
        .input-wrapper input { flex: 1; background: transparent; border: none; color: white; padding: 12px 0; outline: none; font-size: 15px; }
        .canvas-container { height: 100%; width: 100%; background: #0f172a; }
        .node-palette { position: absolute; left: 20px; top: 20px; background: #1e293b; padding: 15px; border-radius: 12px; border: 1px solid #334155; z-index: 10; width: 200px; }
        .draggable-node { padding: 10px; margin-bottom: 8px; background: #334155; border-radius: 6px; cursor: grab; font-size: 14px; border: 1px solid #475569; }
        .properties-panel { position: absolute; right: 0; top: 0; bottom: 0; width: 320px; background: #1e293b; border-left: 1px solid #334155; padding: 25px; z-index: 10; transition: transform 0.3s; }
        .properties-panel.hidden { transform: translateX(100%); }
        .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-weight: 500; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-primary { background: #2563eb; color: white; }
        .btn-ghost { background: transparent; color: #94a3b8; }
        .loader { width: 18px; height: 18px; border: 2px solid #fff; border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;
        const { ReactFlow, ReactFlowProvider, addEdge, Background, Controls, MiniMap, useNodesState, useEdgesState, MarkerType } = ReactFlowInstance;
        const API_URL = 'http://localhost:8000/api';
        const AgentFlowApp = () => {
            const [view, setView] = useState('chat');
            const [activeSession, setActiveSession] = useState('default');
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [nodes, setNodes, onNodesChange] = useNodesState([]);
            const [edges, setEdges, onEdgesChange] = useEdgesState([]);
            const [selectedNode, setSelectedNode] = useState(null);
            const sendMessage = async () => {
                if (!input.trim() || isLoading) return;
                const userMsg = { role: 'user', content: input };
                setMessages(prev => [...prev, userMsg]);
                setInput('');
                setIsLoading(true);
                try {
                    const response = await fetch(`${API_URL}/chat`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: input, session_id: activeSession })
                    });
                    const data = await response.json();
                    setMessages(prev => [...prev, { role: 'assistant', content: data.reply }]);
                } catch (e) {
                    setMessages(prev => [...prev, { role: 'assistant', content: '⚠️ Server error' }]);
                } finally {
                    setIsLoading(false);
                }
            };
            const onConnect = useCallback((params) => setEdges((eds) => addEdge({ ...params, markerEnd: { type: MarkerType.ArrowClosed } }, eds)), []);
            const onDrop = useCallback((event) => {
                event.preventDefault();
                const type = event.dataTransfer.getData('application/reactflow');
                const position = { x: event.clientX - 400, y: event.clientY - 100 };
                const newNode = {
                    id: `${type}_${Date.now()}`,
                    type: 'default',
                    position,
                    data: { label: type.toUpperCase() },
                    style: { background: '#1e293b', color: 'white', border: '1px solid #3b82f6', borderRadius: '8px', padding: '10px' }
                };
                setNodes((nds) => nds.concat(newNode));
            }, [setNodes]);
            return (
                <div className="app-container">
                    <div className="sidebar">
                        <div className="sidebar-header">
                            <i className="fas fa-robot text-blue-500"></i>
                            <h2 style={{fontSize: '20px'}}>AgentFlow Pro</h2>
                        </div>
                        <div className="sidebar-content">
                            <div className={`nav-item ${view === 'chat' ? 'active' : ''}`} onClick={() => setView('chat')}>
                                <i className="fas fa-comment-alt"></i> Chat
                            </div>
                            <div className={`nav-item ${view === 'workflow' ? 'active' : ''}`} onClick={() => setView('workflow')}>
                                <i className="fas fa-project-diagram"></i> Workflows
                            </div>
                        </div>
                    </div>
                    <div className="main-content">
                        <div className="top-bar">
                            <span>Session: <b>{activeSession}</b></span>
                            <button className="btn btn-primary" onClick={() => setActiveSession('sess_'+Date.now())}>New Session</button>
                        </div>
                        <div className="content-body">
                            {view === 'chat' && (
                                <div className="chat-view">
                                    <div className="messages-container">
                                        {messages.map((m, i) => (
                                            <div key={i} className={`message ${m.role}`}>
                                                <div style={{fontSize: '10px', opacity: 0.5}}>{m.role.toUpperCase()}</div>
                                                {m.content}
                                            </div>
                                        ))}
                                    </div>
                                    <div className="chat-input-area">
                                        <div className="input-wrapper">
                                            <input placeholder="Type..." value={input} onChange={(e) => setInput(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && sendMessage()} />
                                            <button className="btn btn-primary" onClick={sendMessage}>Send</button>
                                        </div>
                                    </div>
                                </div>
                            )}
                            {view === 'workflow' && (
                                <div className="canvas-container" onDragOver={(e) => e.preventDefault()} onDrop={onDrop}>
                                    <div className="node-palette">
                                        <div className="draggable-node" draggable onDragStart={(e) => e.dataTransfer.setData('application/reactflow', 'llm')}>LLM Task</div>
                                        <div className="draggable-node" draggable onDragStart={(e) => e.dataTransfer.setData('application/reactflow', 'tool')}>Tool Call</div>
                                    </div>
                                    <ReactFlow nodes={nodes} edges={edges} onNodesChange={onNodesChange} onConnect={onConnect} fitView>
                                        <Background color="#334155" />
                                        <Controls />
                                        <MiniMap />
                                    </ReactFlow>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ReactFlowProvider><AgentFlowApp /></ReactFlowProvider>);
    </script>
</body>
</html>
